name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chorder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chorder_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/chorder_test?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the actual branch so git push back works (PR events use merge commit by default)
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Initialize Database Schemas
        run: |
          # Push to public schema for integration tests
          npx prisma db push
          # Push to e2e schema for Playwright tests
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/chorder_test?schema=e2e" DIRECT_URL="postgresql://postgres:postgres@localhost:5432/chorder_test?schema=e2e" npx prisma db push --accept-data-loss

      - name: Run Vitest (Unit/Integration)
        run: yarn test

      - name: Run Playwright (E2E)
        run: |
          # --update-snapshots aceita diffs visuais sem falhar.
          # Falhas funcionais (toBeVisible, toHaveValue etc.) ainda causam erro.
          # Snapshots são commitados manualmente quando necessário.
          npx playwright test --update-snapshots
        env:
          PORT: 3001
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
